name: Build

# Cross-export Linux, Windows and macOS from a single Linux runner. Godot builds
# from export templates rather than native toolchains, so no OS matrix is needed.
# The barichello/godot-ci:3.6.2 image bundles Godot 3.6.2-stable and its matching
# export templates (3.6.2.stable), the same version the project is developed and
# tested on, so it lines up with export_presets.cfg.

on:
  push:
    tags: ['v*']           # a version tag publishes a GitHub Release
  workflow_dispatch: {}     # manual runs produce downloadable artifacts only

permissions:
  contents: write           # lets the built-in GITHUB_TOKEN create the Release

jobs:
  build:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:3.6.2
    steps:
      - uses: actions/checkout@v4

      # Gate the build on the headless GUT suite (same command as CLAUDE.md, but
      # the container's binary is `godot`, not `godot3`).
      - name: Run tests
        run: godot -s addons/gut/gut_cmdln.gd -gdir=res://tests -ginclude_subdirs -gexit

      # Godot refuses to export into a directory that does not exist.
      - name: Prepare output directories
        run: mkdir -p build/linux build/windows build/macos

      - name: Export builds
        run: |
          godot --export "Linux/X11"      build/linux/Humanish.x86_64
          godot --export "Windows Desktop" build/windows/Humanish.exe
          godot --export "Mac OSX"         build/macos/Humanish.zip
          (cd build && sha256sum linux/* windows/* macos/* > SHA256SUMS)

      # Downloadable from every workflow run (Actions tab).
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: humanish-builds
          path: build/

      # On a v* tag, attach the binaries to a GitHub Release.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/linux/Humanish.x86_64
            build/windows/Humanish.exe
            build/macos/Humanish.zip
            build/SHA256SUMS
