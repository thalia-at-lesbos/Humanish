name: Build

# Cross-export Linux, Windows and macOS from a single Linux runner. Godot builds
# from export templates rather than native toolchains, so no OS matrix is needed.
# The barichello/godot-ci:3.6.2 image bundles Godot 3.6.2-stable and its matching
# export templates (3.6.2.stable), the same version the project is developed and
# tested on, so it lines up with export_presets.cfg.

on:
  push:
    tags: ['v*']           # a version tag publishes a GitHub Release
  workflow_dispatch: {}     # manual runs produce downloadable artifacts only

permissions:
  contents: write           # lets the built-in GITHUB_TOKEN create the Release

jobs:
  build:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:3.6.2
    steps:
      - uses: actions/checkout@v4

      # Gate the build on the headless GUT suite, run in two phases: the unit
      # suites first, then the integration playthrough as a final gate (mirrors
      # run_tests.sh). NOTE: no `--no-window` here. The CI image's `godot` is a
      # headless build that does not consume that flag, so (unlike the local
      # `godot3` editor binary, which swallows it) it would reach
      # OS.get_cmdline_args(); GUT's optparse then reports it as an "Unrecognized
      # option" and exits 1 before any test runs. The binary is already
      # windowless, so the flag is unnecessary as well as harmful.
      - name: Run unit tests
        run: >-
          godot -s addons/gut/gut_cmdln.gd
          -gdir=res://tests/core,res://tests/world,res://tests/sim,res://tests/api,res://tests/scenes,res://tests/net
          -ginclude_subdirs -gexit

      - name: Run integration playthrough
        run: godot -s addons/gut/gut_cmdln.gd -gdir=res://tests/integration -ginclude_subdirs -gexit

      # The godot-ci image ships the export templates under the image build
      # user's HOME (/root), but GitHub Actions container jobs reset HOME to
      # /github/home, so Godot 3.6.2 looks in an empty path and aborts with
      # "No export template found". Copy them to where it expects; fall back to
      # downloading the official 3.6.2 templates if the image lacks them.
      - name: Install export templates
        run: |
          set -eux
          DEST="$HOME/.local/share/godot/templates/3.6.2.stable"
          mkdir -p "$DEST"
          SRC=""
          for c in \
            /root/.local/share/godot/templates/3.6.2.stable \
            /root/.local/share/godot/export_templates/3.6.2.stable; do
            if [ -f "$c/version.txt" ]; then SRC="$c"; break; fi
          done
          if [ -n "$SRC" ]; then
            cp -r "$SRC/." "$DEST/"
          fi
          if [ ! -f "$DEST/linux_x11_64_release" ]; then
            echo "Templates not present in image — downloading official 3.6.2 templates"
            curl -fsSL -o /tmp/tpl.tpz \
              https://github.com/godotengine/godot/releases/download/3.6.2-stable/Godot_v3.6.2-stable_export_templates.tpz
            unzip -q /tmp/tpl.tpz -d /tmp/tpl
            cp -r /tmp/tpl/templates/. "$DEST/"
          fi
          ls "$DEST" | head

      # Godot refuses to export into a directory that does not exist.
      - name: Prepare output directories
        run: mkdir -p build/linux build/windows build/macos

      - name: Export builds
        run: |
          godot --no-window --export "Linux/X11"       build/linux/Humanish-linux-amd64
          godot --no-window --export "Windows Desktop" build/windows/Humanish-windows-amd64.exe
          godot --no-window --export "Mac OSX"         build/macos/Humanish-macos.zip
          (cd build && sha256sum linux/* windows/* macos/* > SHA256SUMS)

      # Bundle user documentation alongside the executables so players have
      # the quick-start guide and reference without a separate download.
      - name: Bundle user docs
        run: |
          cp docs/user/quick-start.md    build/linux/
          cp docs/user/user-reference.md build/linux/
          cp docs/user/quick-start.md    build/windows/
          cp docs/user/user-reference.md build/windows/
          cp docs/user/quick-start.md    build/macos/
          cp docs/user/user-reference.md build/macos/

      # Downloadable from every workflow run (Actions tab).
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: humanish-builds
          path: build/

      # On a v* tag, attach the binaries to a GitHub Release.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/linux/Humanish-linux-amd64
            build/linux/quick-start.md
            build/linux/user-reference.md
            build/windows/Humanish-windows-amd64.exe
            build/windows/quick-start.md
            build/windows/user-reference.md
            build/macos/Humanish-macos.zip
            build/macos/quick-start.md
            build/macos/user-reference.md
            build/SHA256SUMS
